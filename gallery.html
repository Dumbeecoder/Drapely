<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drapely — My Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#C9973A;--gold-light:#F0D9A8;--gold-pale:#FBF4E8;--deep:#0F0A04;--muted:#7A6A52;--text:#2A1F0E;--border:rgba(201,151,58,0.18);--border-mid:rgba(201,151,58,0.35);--surface:#FDFAF5;--white:#fff}
    body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);min-height:100vh}
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:var(--deep);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;padding:0 0 1.5rem}
    .sidebar-brand{padding:1.5rem 1.5rem 1.25rem;border-bottom:1px solid var(--border);font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--gold-light);letter-spacing:3px;text-transform:uppercase;text-decoration:none;display:block}
    .sidebar-brand span{color:var(--gold)}
    .sidebar-nav{flex:1;padding:1.25rem 0.75rem;display:flex;flex-direction:column;gap:4px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background 0.15s;text-decoration:none;color:rgba(240,217,168,0.45);font-size:13px;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif}
    .nav-item:hover{background:rgba(201,151,58,0.08);color:var(--gold-light)}
    .nav-item.active{background:rgba(201,151,58,0.12);color:var(--gold-light)}
    .nav-icon{width:16px;height:16px;flex-shrink:0}
    .nav-section-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(240,217,168,0.2);padding:12px 12px 4px;font-weight:500}
    .sidebar-footer{padding:0 0.75rem;border-top:1px solid var(--border);padding-top:1rem}
    .user-chip{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:rgba(201,151,58,0.06);border:1px solid var(--border)}
    .user-avatar{width:30px;height:30px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--deep);flex-shrink:0}
    .user-name{font-size:12px;font-weight:500;color:var(--gold-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .user-plan{font-size:10px;color:var(--gold)}
    .main{margin-left:220px;min-height:100vh}
    .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
    .topbar-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--text)}
    .topbar-sub{font-size:12px;color:var(--muted);margin-left:10px}
    .new-btn{padding:9px 20px;background:var(--gold);color:var(--deep);border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-block}
    .new-btn:hover{background:#e0aa42}
    .content{padding:2rem}
    .filters{display:flex;gap:10px;margin-bottom:2rem;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .filter-left{display:flex;gap:8px;flex-wrap:wrap}
    .filter-btn{padding:7px 16px;border:1px solid var(--border-mid);border-radius:20px;background:var(--white);font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.15s}
    .filter-btn:hover,.filter-btn.active{background:var(--gold);border-color:var(--gold);color:var(--white)}
    .sort-select{padding:7px 14px;border:1px solid var(--border-mid);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);background:var(--white);outline:none}
    .empty-state{text-align:center;padding:5rem 2rem;color:var(--muted)}
    .empty-icon{font-size:56px;margin-bottom:1.5rem;opacity:0.3}
    .empty-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--text);margin-bottom:8px}
    .empty-sub{font-size:14px;line-height:1.7;margin-bottom:2rem}
    .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
    .gallery-card{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s}
    .gallery-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(201,151,58,0.1)}
    .gallery-img{width:100%;height:280px;object-fit:cover;display:block;cursor:pointer}
    .gallery-img-placeholder{width:100%;height:280px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;background:linear-gradient(160deg,#f8f3ea,#e8d4b0);color:var(--muted);font-size:13px;cursor:pointer}
    .gallery-card-body{padding:12px 14px}
    .gallery-card-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px}
    .gallery-card-meta{font-size:11px;color:var(--muted)}
    .gallery-card-actions{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border)}
    .action-btn{flex:1;padding:7px 0;border:1px solid var(--border-mid);border-radius:6px;background:var(--white);font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.15s;text-align:center}
    .action-btn:hover{background:var(--gold);color:var(--deep);border-color:var(--gold)}
    .action-btn.primary{background:var(--gold);color:var(--deep);border-color:var(--gold)}
    .viewer-modal{display:none;position:fixed;inset:0;background:rgba(15,10,4,0.92);z-index:500;align-items:center;justify-content:center}
    .viewer-modal.open{display:flex}
    .viewer-inner{position:relative;max-width:90vw;max-height:90vh;text-align:center}
    .viewer-img{max-width:90vw;max-height:80vh;object-fit:contain;border-radius:8px;display:block}
    .viewer-close{position:absolute;top:-40px;right:0;background:none;border:none;color:rgba(240,217,168,0.6);font-size:28px;cursor:pointer}
    .viewer-actions{display:flex;gap:10px;margin-top:12px;justify-content:center}
    .viewer-btn{padding:9px 24px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none}
    .viewer-btn.download{background:var(--gold);color:var(--deep)}
    .viewer-btn.share{background:rgba(255,255,255,0.1);color:var(--gold-light);border:1px solid rgba(201,151,58,0.3)}
    .stats-bar{display:flex;gap:20px;margin-bottom:2rem;padding:1.25rem 1.5rem;background:var(--white);border:1px solid var(--border);border-radius:12px;flex-wrap:wrap}
    .stat-item{display:flex;flex-direction:column;gap:2px}
    .stat-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--text);line-height:1}
    .stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
    .stat-divider{width:1px;background:var(--border);align-self:stretch}
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--deep);color:var(--gold-light);padding:11px 22px;border-radius:30px;font-size:13px;border:1px solid var(--border-mid);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:999;white-space:nowrap}
    .toast.show{transform:translateX(-50%) translateY(0)}
    @media(max-width:900px){.sidebar{display:none}.main{margin-left:0}}
    @media(max-width:600px){.content{padding:1rem}.gallery-grid{grid-template-columns:repeat(2,1fr);gap:12px}.gallery-img,.gallery-img-placeholder{height:180px}}
  </style>
</head>
<body>

<div class="sidebar">
  <a href="index.html" class="sidebar-brand">Drape<span>ly</span></a>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Studio</div>
    <a class="nav-item" href="dashboard.html">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
      New photoshoot
    </a>
    <a class="nav-item active" href="gallery.html">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
      My gallery
    </a>
    <a class="nav-item" href="#">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 2.186 2.25 2.25 0 00-3.935-2.186zm0-12.814a2.25 2.25 0 103.933-2.185 2.25 2.25 0 00-3.933 2.185z"/></svg>
      Share catalogue
    </a>
    <div class="nav-section-label" style="margin-top:8px;">Account</div>
    <a class="nav-item" href="#">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      Settings
    </a>
    <button class="nav-item" onclick="doSignOut()">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/></svg>
      Sign out
    </button>
  </nav>
  <div class="sidebar-footer">
    <div class="user-chip">
      <div class="user-avatar" id="user-avatar">?</div>
      <div><div class="user-name" id="user-name">Loading...</div><div class="user-plan">Beta · Free</div></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div style="display:flex;align-items:baseline;gap:6px;">
      <div class="topbar-title">My Gallery</div>
      <div class="topbar-sub" id="topbar-sub"></div>
    </div>
    <a href="dashboard.html" class="new-btn">+ New Photoshoot</a>
  </div>

  <div class="content">
    <div class="stats-bar">
      <div class="stat-item"><div class="stat-val" id="total-shoots">0</div><div class="stat-lbl">Photoshoots</div></div>
      <div class="stat-divider"></div>
      <div class="stat-item"><div class="stat-val" id="total-images">0</div><div class="stat-lbl">Images</div></div>
      <div class="stat-divider"></div>
      <div class="stat-item"><div class="stat-val" id="total-credits">—</div><div class="stat-lbl">Credits left</div></div>
      <div class="stat-divider"></div>
      <div class="stat-item"><div class="stat-val" id="total-downloads">0</div><div class="stat-lbl">Downloads</div></div>
    </div>

    <div class="filters">
      <div class="filter-left">
        <button class="filter-btn active" onclick="filterGallery('all',this)">All</button>
        <button class="filter-btn" onclick="filterGallery('salwar',this)">Salwar Kameez</button>
        <button class="filter-btn" onclick="filterGallery('anarkali',this)">Anarkali</button>
        <button class="filter-btn" onclick="filterGallery('lehenga',this)">Lehenga</button>
      </div>
      <select class="sort-select" onchange="sortGallery(this.value)">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
      </select>
    </div>

    <div id="gallery-container"></div>
  </div>
</div>

<div class="viewer-modal" id="viewer-modal" onclick="closeViewer(event)">
  <div class="viewer-inner">
    <button class="viewer-close" onclick="closeViewerBtn()">✕</button>
    <img class="viewer-img" id="viewer-img" src="" alt="Photoshoot" />
    <div class="viewer-actions">
      <button class="viewer-btn download" onclick="downloadViewer()">↓ Download HD</button>
      <button class="viewer-btn share" onclick="shareViewer()">Share</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var sb = window.supabase.createClient(
  'https://oqmoneclnirnhqpcdeqy.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xbW9uZWNsbmlybmhxcGNkZXF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMDQ5NDMsImV4cCI6MjA5MjY4MDk0M30.GjhQiQYxAlK3eGE6MtJ_e_UTMfzdrLFco0f5RFSb-mM'
);

var allImages = [];
var currentViewer = null;
var downloadCount = 0;

sb.auth.getSession().then(function(r) {
  if (!r.data.session) { window.location.href = 'auth.html'; return; }
  var user = r.data.session.user;
  var meta = user.user_metadata || {};
  var fname = (meta.first_name || '').trim();
  var lname = (meta.last_name || '').trim();
  var fullname = (fname + ' ' + lname).trim();
  var displayName = fullname.length > 1 ? fullname : user.email.split('@')[0];
  var initials = fname && lname ? (fname[0]+lname[0]).toUpperCase() : displayName.slice(0,2).toUpperCase();
  document.getElementById('user-name').textContent = displayName;
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('topbar-sub').textContent = displayName + '\'s photos';
  loadCredits(user.id);
  loadGallery(user.id);
});

function loadCredits(userId) {
  sb.from('credits').select('balance').eq('user_id', userId).single().then(function(r) {
    document.getElementById('total-credits').textContent = r.data ? r.data.balance : '3';
  });
}

function loadGallery(userId) {
  sb.from('photoshoots').select('*').eq('user_id', userId).order('created_at', { ascending: false }).then(function(r) {
    if (r.error || !r.data || r.data.length === 0) {
      showEmptyState();
      return;
    }
    allImages = r.data;
    document.getElementById('total-shoots').textContent = r.data.length;
    document.getElementById('total-images').textContent = r.data.reduce(function(a,b){ return a + (b.image_count || 1); }, 0);
    renderGallery(allImages);
  });
}

function showEmptyState() {
  document.getElementById('gallery-container').innerHTML = '<div class="empty-state"><div class="empty-icon">📷</div><div class="empty-title">No photoshoots yet</div><div class="empty-sub">Generate your first AI photoshoot and your images will appear here automatically.</div><a href="dashboard.html" class="new-btn" style="display:inline-block;">Start your first photoshoot →</a></div>';
}

function renderGallery(images) {
  if (!images || images.length === 0) { showEmptyState(); return; }
  var html = '<div class="gallery-grid">';
  images.forEach(function(item, i) {
    var date = new Date(item.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    var imgSrc = item.image_url || '';
    html += '<div class="gallery-card">';
    if (imgSrc) {
      html += '<img class="gallery-img" src="' + imgSrc + '" onclick="openViewer(\'' + imgSrc + '\')" onerror="this.style.display=\'none\'" />';
    } else {
      html += '<div class="gallery-img-placeholder" onclick="showToast(\'Image coming soon!\')"><span style="font-size:32px;">✨</span><span>AI Photoshoot</span></div>';
    }
    html += '<div class="gallery-card-body"><div class="gallery-card-title">' + (item.collection_name || 'Photoshoot ' + (i+1)) + '</div><div class="gallery-card-meta">' + (item.suit_type || 'Designer Suit') + ' · ' + date + '</div></div>';
    html += '<div class="gallery-card-actions"><button class="action-btn" onclick="openViewer(\'' + imgSrc + '\')">View</button><button class="action-btn primary" onclick="downloadImage(\'' + imgSrc + '\',' + (i+1) + ')">Download</button></div>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('gallery-container').innerHTML = html;
}

function filterGallery(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  if (type === 'all') { renderGallery(allImages); return; }
  var filtered = allImages.filter(function(i){ return i.suit_type && i.suit_type.toLowerCase().includes(type); });
  renderGallery(filtered.length ? filtered : allImages);
}

function sortGallery(order) {
  var sorted = allImages.slice().sort(function(a,b){
    return order === 'newest' ? new Date(b.created_at) - new Date(a.created_at) : new Date(a.created_at) - new Date(b.created_at);
  });
  renderGallery(sorted);
}

function openViewer(src) {
  if (!src) { showToast('Image not available yet'); return; }
  currentViewer = src;
  document.getElementById('viewer-img').src = src;
  document.getElementById('viewer-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeViewer(e) {
  if (e.target === document.getElementById('viewer-modal')) closeViewerBtn();
}

function closeViewerBtn() {
  document.getElementById('viewer-modal').classList.remove('open');
  document.body.style.overflow = '';
}

function downloadViewer() {
  if (!currentViewer) return;
  downloadImage(currentViewer, 1);
}

function downloadImage(url, num) {
  if (!url) { showToast('Image not available yet'); return; }
  var a = document.createElement('a');
  a.href = url;
  a.download = 'drapely-' + num + '.jpg';
  a.target = '_blank';
  a.click();
  downloadCount++;
  document.getElementById('total-downloads').textContent = downloadCount;
  showToast('✓ Downloading...');
}

function shareViewer() {
  if (!currentViewer) return;
  if (navigator.share) {
    navigator.share({ title: 'My Drapely Photoshoot', url: currentViewer }).catch(function(){});
  } else {
    navigator.clipboard.writeText(currentViewer).then(function(){ showToast('✓ Link copied!'); });
  }
}

async function doSignOut() {
  await sb.auth.signOut();
  window.location.href = 'auth.html';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}
</script>
</body>
</html>
