<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Gallery — Drapely</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#f9f9f9;color:#000;display:flex;min-height:100vh;}
    /* SIDEBAR */
    .sidebar{width:220px;background:#000;min-height:100vh;display:flex;flex-direction:column;padding:1.5rem 0;flex-shrink:0;position:fixed;left:0;top:0;bottom:0;z-index:10;}
    .brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:#fff;letter-spacing:3px;text-transform:uppercase;text-decoration:none;padding:0 1.25rem 1.25rem;border-bottom:1px solid rgba(233,30,99,0.2);display:block;}
    .brand span{color:#E91E63;}
    .nav-section{padding:1.25rem 0.75rem 0.5rem;font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1.5px;font-weight:500;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 1rem;text-decoration:none;color:rgba(255,255,255,0.55);font-size:13px;border-radius:8px;margin:2px 0.5rem;transition:all 0.15s;}
    .nav-item:hover,.nav-item.active{background:rgba(233,30,99,0.12);color:#fff;}
    .nav-item.active{color:#E91E63;}
    .nav-icon{width:16px;height:16px;flex-shrink:0;}
    .nav-footer{margin-top:auto;padding:1rem 0.75rem;border-top:1px solid rgba(233,30,99,0.15);}
    .user-pill{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(233,30,99,0.08);border-radius:10px;}
    .user-av{width:32px;height:32px;border-radius:50%;background:#E91E63;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#fff;flex-shrink:0;}
    .user-name{font-size:12px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .user-plan{font-size:10px;color:#E91E63;}
    /* MAIN */
    .main{margin-left:220px;flex:1;padding:2rem;min-height:100vh;}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;}
    .topbar h1{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;letter-spacing:1px;}
    .new-btn{padding:10px 20px;background:#E91E63;color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-block;}
    /* STATS */
    .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:#fff;border:1px solid rgba(233,30,99,0.12);border-radius:14px;margin-bottom:1.5rem;overflow:hidden;}
    .stat-item{padding:1.25rem 1.5rem;text-align:center;border-right:1px solid rgba(233,30,99,0.1);}
    .stat-item:last-child{border-right:none;}
    .stat-val{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;line-height:1;}
    .stat-lbl{font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-top:4px;}
    /* TABS */
    .tab-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
    .tab-pills{display:flex;gap:8px;}
    .tab-pill{padding:8px 20px;border-radius:20px;border:1.5px solid rgba(233,30,99,0.3);background:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:#555;cursor:pointer;transition:all 0.15s;}
    .tab-pill.active{background:#E91E63;border-color:#E91E63;color:#fff;}
    /* GALLERY GRID */
    .gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
    .gallery-card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid rgba(233,30,99,0.1);box-shadow:0 2px 8px rgba(0,0,0,0.05);transition:transform 0.15s;}
    .gallery-card:hover{transform:translateY(-2px);}
    .gallery-img{width:100%;height:160px;object-fit:contain;display:block;cursor:pointer;background:#f5f5f5;}
    .gallery-card-body{padding:8px 12px;}
    .gallery-card-title{font-size:13px;font-weight:500;color:#000;margin-bottom:2px;}
    .gallery-card-meta{font-size:11px;color:#555;}
    .gallery-card-actions{display:flex;gap:6px;padding:0 12px 10px;}
    .action-btn{flex:1;padding:6px;border:1.5px solid rgba(233,30,99,0.3);border-radius:6px;background:#fff;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:#555;cursor:pointer;text-align:center;}
    .action-btn.primary{background:#E91E63;border-color:#E91E63;color:#fff;}
    /* VIDEO GRID */
    .video-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
    .video-card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid rgba(233,30,99,0.1);box-shadow:0 2px 8px rgba(0,0,0,0.05);}
    .video-el{width:100%;height:160px;object-fit:contain;display:block;background:#f5f5f5;}
    .video-card-body{padding:12px 14px;}
    .video-card-title{font-size:13px;font-weight:500;}
    .video-card-meta{font-size:11px;color:#555;margin-bottom:10px;}
    .video-card-actions{display:flex;gap:8px;}
    /* EMPTY */
    .empty-state{text-align:center;padding:4rem 2rem;color:#555;}
    /* VIEWER */
    .viewer-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;align-items:center;justify-content:center;}
    .viewer-modal.open{display:flex;}
    .viewer-img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px;}
    .viewer-close{position:fixed;top:20px;right:24px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;}
    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#000;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:all 0.3s;z-index:9999;pointer-events:none;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    @media(max-width:768px){.sidebar{display:none}.main{margin-left:0}.stats-bar{grid-template-columns:1fr 1fr}.gallery-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>

<div class="sidebar">
  <a href="index.html" class="brand">Drape<span>ly</span></a>
  <div class="nav-section">STUDIO</div>
  <a href="dashboard.html" class="nav-item">
    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
    New photoshoot
  </a>
  <a href="dashboard.html" onclick="sessionStorage.setItem('openTab','video')" class="nav-item">
    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z"/></svg>
    New video
  </a>
  <a href="gallery.html" class="nav-item active">
    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5z"/></svg>
    My gallery
  </a>
  <div class="nav-section">ACCOUNT</div>
  <a href="settings.html" class="nav-item">
    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    Settings
  </a>
  <a href="#" onclick="doSignOut()" class="nav-item">
    <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/></svg>
    Sign out
  </a>
  <div class="nav-footer">
    <div class="user-pill">
      <div class="user-av" id="user-avatar">?</div>
      <div><div class="user-name" id="user-name">Loading...</div><div class="user-plan">Beta · Free</div></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <h1>My Gallery <span id="topbar-sub" style="font-size:16px;color:#555;font-family:'DM Sans',sans-serif;font-weight:300;"></span></h1>
    <a href="dashboard.html" class="new-btn">+ New Photoshoot</a>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-val" id="total-shoots">—</div><div class="stat-lbl">Photoshoots</div></div>
    <div class="stat-item"><div class="stat-val" id="total-images">—</div><div class="stat-lbl">Images</div></div>
    <div class="stat-item"><div class="stat-val" id="total-videos">—</div><div class="stat-lbl">Videos Generated</div></div>
    <div class="stat-item"><div class="stat-val" id="total-credits">—</div><div class="stat-lbl">Credits Left</div></div>
  </div>

  <div class="tab-bar">
    <div class="tab-pills">
      <button class="tab-pill active" id="pill-photos" onclick="showTab('photos')">📷 Photos</button>
      <button class="tab-pill" id="pill-videos" onclick="showTab('videos')">🎬 Videos</button>
    </div>
  </div>

  <div id="photos-section">
    <div id="gallery-container"><div class="empty-state"><div style="font-size:48px;opacity:0.3;margin-bottom:1rem;">📷</div><div>Loading your photos...</div></div></div>
  </div>

  <div id="videos-section" style="display:none;">
    <div id="video-container"><div class="empty-state"><div style="font-size:48px;opacity:0.3;margin-bottom:1rem;">🎬</div><div>Loading your videos...</div></div></div>
  </div>
</div>

<!-- VIEWER -->
<div class="viewer-modal" id="viewer-modal" onclick="closeViewer()">
  <button class="viewer-close" onclick="closeViewer()">✕</button>
  <img class="viewer-img" id="viewer-img" src="" />
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var sb = window.supabase.createClient(
  'https://oqmoneclnirnhqpcdeqy.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xbW9uZWNsbmlybmhxcGNkZXF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMDQ5NDMsImV4cCI6MjA5MjY4MDk0M30.GjhQiQYxAlK3eGE6MtJ_e_UTMfzdrLFco0f5RFSb-mM'
);

var allPhotos = [];
var allVideos = [];
var currentTab = 'photos';

// INIT
sb.auth.getSession().then(function(r) {
  if (!r.data.session) { window.location.href = 'auth.html'; return; }
  var user = r.data.session.user;
  var meta = user.user_metadata || {};
  var fname = (meta.first_name || '').trim();
  var lname = (meta.last_name || '').trim();
  var displayName = (fname + ' ' + lname).trim() || user.email.split('@')[0];
  var initials = displayName.slice(0,2).toUpperCase();
  document.getElementById('user-name').textContent = displayName;
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('topbar-sub').textContent = displayName + "'s photos";
  loadCredits(user.id);
  loadGallery(user.id);
});

function loadCredits(userId) {
  sb.from('credits').select('balance').eq('user_id', userId).single().then(function(r) {
    document.getElementById('total-credits').textContent = r.data ? r.data.balance : '—';
  });
}

function loadGallery(userId) {
  sb.from('photoshoots').select('*').eq('user_id', userId).order('created_at', {ascending: false}).then(function(r) {
    if (r.error) { console.log('Error:', r.error.message); return; }
    var data = r.data || [];

    allPhotos = data.filter(function(i){ return i.media_type !== 'video' && i.suit_type !== 'Video'; });
    allVideos = data.filter(function(i){ return i.media_type === 'video' || i.suit_type === 'Video'; });

    document.getElementById('total-shoots').textContent = allPhotos.length;
    document.getElementById('total-images').textContent = allPhotos.length;
    document.getElementById('total-videos').textContent = allVideos.length;

    renderPhotos(allPhotos);
    if (currentTab === 'videos') renderVideos(allVideos);
  });
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-pill').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('pill-' + tab).classList.add('active');
  document.getElementById('photos-section').style.display = tab === 'photos' ? 'block' : 'none';
  document.getElementById('videos-section').style.display = tab === 'videos' ? 'block' : 'none';
  if (tab === 'videos') renderVideos(allVideos);
}

function renderPhotos(photos) {
  var container = document.getElementById('gallery-container');
  if (!photos || photos.length === 0) {
    container.innerHTML = '<div class="empty-state"><div style="font-size:48px;opacity:0.3;margin-bottom:1rem;">📷</div><div style="font-size:15px;font-weight:500;margin-bottom:8px;">No photos yet</div><div style="font-size:13px;color:#555;margin-bottom:1.5rem;">Generate your first AI photoshoot!</div><a href="dashboard.html" class="new-btn">Start a photoshoot</a></div>';
    return;
  }
  var grid = document.createElement('div');
  grid.className = 'gallery-grid';
  photos.forEach(function(item, i) {
    var date = new Date(item.created_at).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});
    var url = item.image_url || '';
    var card = document.createElement('div');
    card.className = 'gallery-card';

    var img = document.createElement('img');
    img.className = 'gallery-img';
    img.src = url;
    img.loading = 'lazy';
    img.onclick = (function(u){ return function(){ openViewer(u); }; })(url);
    card.appendChild(img);

    var body = document.createElement('div');
    body.className = 'gallery-card-body';
    body.innerHTML = '<div class="gallery-card-title">' + (item.collection_name || 'AI Photoshoot') + '</div><div class="gallery-card-meta">' + date + '</div>';
    card.appendChild(body);

    var actions = document.createElement('div');
    actions.className = 'gallery-card-actions';

    var viewBtn = document.createElement('button');
    viewBtn.className = 'action-btn';
    viewBtn.textContent = 'View';
    viewBtn.onclick = (function(u){ return function(){ openViewer(u); }; })(url);

    var dlBtn = document.createElement('button');
    dlBtn.className = 'action-btn primary';
    dlBtn.textContent = 'Download';
    dlBtn.onclick = (function(u, n){ return function(){ downloadImage(u, n); }; })(url, i+1);

    actions.appendChild(viewBtn);
    actions.appendChild(dlBtn);
    card.appendChild(actions);
    grid.appendChild(card);
  });
  container.innerHTML = '';
  container.appendChild(grid);
}

function renderVideos(videos) {
  var container = document.getElementById('video-container');
  if (!videos || videos.length === 0) {
    container.innerHTML = '<div class="empty-state"><div style="font-size:48px;opacity:0.3;margin-bottom:1rem;">🎬</div><div style="font-size:15px;font-weight:500;margin-bottom:8px;">No videos yet</div><div style="font-size:13px;color:#555;margin-bottom:1.5rem;">Generate your first AI fashion video!</div><a href="dashboard.html" onclick="sessionStorage.setItem(\'openTab\',\'video\')" class="new-btn">Create a video</a></div>';
    return;
  }
  var grid = document.createElement('div');
  grid.className = 'video-grid';
  videos.forEach(function(item, i) {
    var date = new Date(item.created_at).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});
    var url = item.image_url || '';
    var card = document.createElement('div');
    card.className = 'video-card';

    var vid = document.createElement('video');
    vid.className = 'video-el';
    vid.src = url;
    vid.controls = true;
    vid.setAttribute('playsinline', '');
    vid.setAttribute('preload', 'metadata');
    card.appendChild(vid);

    var body = document.createElement('div');
    body.className = 'video-card-body';
    body.innerHTML = '<div class="video-card-title">AI Fashion Video</div><div class="video-card-meta">' + date + '</div>';

    var actions = document.createElement('div');
    actions.className = 'video-card-actions';

    var dlA = document.createElement('a');
    dlA.href = url;
    dlA.target = '_blank';
    dlA.className = 'action-btn primary';
    dlA.textContent = '↓ Download';
    dlA.style.textDecoration = 'none';
    dlA.style.textAlign = 'center';

    var waBtn = document.createElement('button');
    waBtn.className = 'action-btn';
    waBtn.textContent = '💬 Share';
    waBtn.onclick = (function(u){ return function(){
      window.open('https://wa.me/?text=' + encodeURIComponent('Check this AI fashion video from Drapely! ' + u), '_blank');
    }; })(url);

    actions.appendChild(dlA);
    actions.appendChild(waBtn);
    body.appendChild(actions);
    card.appendChild(body);
    grid.appendChild(card);
  });
  container.innerHTML = '';
  container.appendChild(grid);
}

function openViewer(url) {
  document.getElementById('viewer-img').src = url;
  document.getElementById('viewer-modal').classList.add('open');
}

function closeViewer() {
  document.getElementById('viewer-modal').classList.remove('open');
}

function downloadImage(url, num) {
  var a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  a.download = 'drapely-photo-' + num + '.jpg';
  a.click();
  showToast('Downloading...');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

async function doSignOut() {
  await sb.auth.signOut();
  window.location.href = 'auth.html';
}
</script>
</body>
</html>
